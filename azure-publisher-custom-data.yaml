#cloud-config
runcmd:
  - |
    cloud-init-per once npa-setup bash -c '
      PUBLISHER_TOKEN="<token>"

      # Wait for DNS
      MAX_RETRIES=12
      COUNT=0
      until getent hosts gateway.npa.goskope.com || [ $COUNT -eq $MAX_RETRIES ]; do
        sleep 5
        ((COUNT++))
      done

      # Only run wizard if DNS actually resolved
      if getent hosts gateway.npa.goskope.com; then
        cd /home/ubuntu
        ./npa_publisher_wizard -token "$PUBLISHER_TOKEN"
      else
        echo "Error: DNS resolution for gateway.npa.goskope.com failed after $MAX_RETRIES attempts" >&2
        exit 1
      fi
    '
